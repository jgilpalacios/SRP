<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar Archivos</title>
</head>

<body>
    <h2>Subir archivos de texto</h2>
    <input type="file" id="fileInput" multiple>
    <button onclick="descargarJS()">Descargar archivos.js</button>
    <hr>
    Leer un "archivos.js": <input type="file" id="fileConjunto" multiple>
    Descargar un zip con los scripts: <button onclick="descargarZip()">Descargar ZIP</button>
    <pre id="output"></pre>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let archivos = [];

        document.getElementById('fileInput').addEventListener('change', function (event) {
            const files = event.target.files;
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    archivos.push({ nombre: file.name, contenido: e.target.result });
                    document.getElementById('output').textContent = JSON.stringify(archivos, null, 2);
                };
                reader.readAsText(file);
            }
        });
        document.getElementById('fileConjunto').addEventListener('change', function (event) {
            const files = event.target.files;
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    let texto = e.target.result;
                    // eliminar "const archivos =" del inicio
                    //texto = texto.replace(/^const\s+archivos\s*=\s*/, "")
                    texto = texto.replace(/^\s*(const|let|var)\s+[a-zA-Z_$][a-zA-Z0-9_$]*\s*=\s*/, "")
                    // eliminar el ; final
                    texto = texto.replace(/;$/, "");
                    try {
                        archivos = JSON.parse(texto)
                    }
                    catch (e) {
                        alert("Error leyendo archivo")
                        console.error(e)
                    }
                    //archivos.push({ nombre: file.name, contenido: e.target.result });
                    document.getElementById('output').textContent = JSON.stringify(archivos, null, 2);
                };
                reader.readAsText(file);
            }
        });

        function descargarJS() {
            const blob = new Blob([`const archivos = ${JSON.stringify(archivos, null, 2)};`], { type: 'application/javascript' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'archivos.js';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function descargarZip() {

            if (archivos.length == 0) {
                alert("No hay archivos cargados")
                return
            }

            const zip = new JSZip()

            archivos.forEach(a => {

                // desescapar contenido
                const contenido = a.contenido

                zip.file(a.nombre, contenido)

            })

            const blob = await zip.generateAsync({ type: "blob" })

            const a = document.createElement("a")
            a.href = URL.createObjectURL(blob)
            a.download = "archivos.zip"
            a.click()

        }
    </script>
</body>

</html>
